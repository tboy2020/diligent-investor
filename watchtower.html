function MiniChart(props){
  var data = props.data || [];
  if (data.length < 2) return null;
  var W=520,H=168,pl=48,pr=10,pt=10,pb=22;
  var maxY = Math.max.apply(null, data.map(function(d){return d.total;})) * 1.08 || 1;
  var n = data.length;
  var idx = data.map(function(_,i){return i;});
  function x(i){ return pl + (i/(n-1))*(W-pl-pr); }
  function y(v){ return pt + (1 - v/maxY)*(H-pt-pb); }
  var base = H-pb;
  var contribTop = idx.map(function(i){ return x(i)+' '+y(data[i].contributed); }).join(' L');
  var contribPath = 'M'+x(0)+' '+base+' L'+contribTop+' L'+x(n-1)+' '+base+' Z';

  var botStr = idx.slice().reverse().map(function(i){ return x(i)+' '+y(data[i].contributed); }).join(' L');
  var growthPath = 'M'+topStr+' L'+botStr+' Z';
  return (

          <line x1={pl} y1={y(v)} x2={W-pr} y2={y(v)} stroke="rgba(198,162,76,0.1)"/>

        </g>); })}

}

async function askClaude(prompt, useSearch) {
  if (location.hostname.indexOf("claude") === -1 && location.hostname.indexOf("anthropic") === -1) { throw new Error("Live fetch runs inside the Claude app. This deployed copy shows the framework; open it in Claude for live data."); }
  var body = { model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] };
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  var res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
  });
  var data = await res.json();
  return (data.content || []).filter(function (b) { return b.type === "text"; }).map(function (b) { return b.text; }).join("\n");
}

function App() {
  var [live, setLive] = useState({});
  var [scrTicker, setScrTicker] = useState("");
  var [scrResult, setScrResult] = useState(null);
  var [scrLoading, setScrLoading] = useState(false);
  var [scrErr, setScrErr] = useState("");
  var [watch, setWatch] = useState([]);
  var [allLoading, setAllLoading] = useState(false);

  var [planTicker, setPlanTicker] = useState("NVDA");
  var [planTarget, setPlanTarget] = useState(3000);
  var [planTranches, setPlanTranches] = useState(3);
  var [planDip, setPlanDip] = useState(true);

  useEffect(function () {
    var el = document.createElement("style"); el.textContent = STYLES; document.head.appendChild(el);
    return function () { document.head.removeChild(el); };
  }, []);

  function setOne(t, patch) {
    setLive(function (prev) { var n = Object.assign({}, prev); n[t] = Object.assign({}, prev[t], patch); return n; });
  }

  async function fetchOne(t) {
    setOne(t, { loading: true, error: "" });
    try {
      var txt = await askClaude(
        "Use web search to find the latest available market data for US-listed security " + t +
        ". Return ONLY a JSON object, no markdown or commentary: " +
        '{"price":number,"changePct":number,"low52":number,"high52":number,"peFwd":number,"asOf":"date string","note":"max 10 words on recent trend"}. ' +
        "Use most recent close if intraday is unavailable. Use null for anything unknown.", true);
      var d = parseJSON(txt);
      if (!d) { setOne(t, { loading: false, error: "Couldn't read the data — tap to retry." }); return; }
      setOne(t, { loading: false, data: d, error: "" });
    } catch (e) {
      setOne(t, { loading: false, error: (e && e.message) ? e.message : "Fetch failed — retry." });
    }
  }

  async function fetchAll() {
    setAllLoading(true);
    for (var i = 0; i < UNIVERSE.length; i++) { await fetchOne(UNIVERSE[i].t); }
    setAllLoading(false);
  }

  async function runScreen() {
    var t = scrTicker.trim().toUpperCase();
    if (!t) return;
    setScrLoading(true); setScrErr(""); setScrResult(null);
    try {
      var txt = await askClaude(
        "Evaluate US-listed security " + t + " against an AI-infrastructure investment thesis — the physical build-out behind AI: " +
        "compute/chips, HBM memory, power & energy, electrical & cooling, networking & optical, data-center REITs, raw materials. " +
        "Use web search. Return ONLY JSON, no markdown: " +
        '{"ticker":"' + t + '","name":"company name","layer":"best-fit layer or None","chokepoint":true or false,' +
        '"pureplay":"Pure-play" or "Diversified","qualifies":"Strong fit" or "Partial fit" or "Off-thesis",' +
        '"thesis":"max 25 words on why it fits or does not","price":number or null,"peFwd":number or null}.', true);
      var d = parseJSON(txt);
      if (!d) { setScrErr("Couldn't read that one — try again."); setScrLoading(false); return; }
      setScrResult(d); setScrLoading(false);
    } catch (e) { setScrErr((e && e.message) ? e.message : "Screen failed — retry."); setScrLoading(false); }
  }

  function addWatch(d) {
    if (!d || watch.some(function (w) { return w.ticker === d.ticker; })) return;
    setWatch(function (p) { return p.concat([d]); });
  }

  var planOptions = UNIVERSE.map(function (u) { return u.t; }).concat(
    watch.map(function (w) { return w.ticker; }).filter(function (t) { return UNIVERSE.every(function (u) { return u.t !== t; }); })
  );
  var planLive = live[planTicker] && live[planTicker].data;
  var perTranche = planTarget / planTranches;
  var tranches = [];
  for (var i = 0; i < planTranches; i++) {
    var label = i === 0 ? "Open now" : planDip ? ("Add on −" + (i * 8) + "% dip") : ("Add in month " + (i + 1));
    var trigPrice = planDip && planLive && planLive.price ? planLive.price * (1 - i * 0.08) : null;
    var shares = trigPrice ? perTranche / trigPrice : (planLive && planLive.price ? perTranche / planLive.price : null);
    tranches.push({ label: label, amount: perTranche, trigPrice: trigPrice, shares: shares });
  }

  function renderCard(u) {
    var st = live[u.t] || {};
    var d = st.data;
    var pos = d && d.low52 != null && d.high52 != null && d.high52 > d.low52
      ? Math.max(0, Math.min(1, (d.price - d.low52) / (d.high52 - d.low52))) : null;
    return (
      <div className="wt-card" key={u.t}>
        <div className="wt-crow">
          <div>
            <div className="wt-tick">{u.t}</div>
            <div className="wt-name">{u.n}</div>
          </div>
          <div className="wt-badges">
            {u.type === "etf" && <span className="wt-b etf">ETF</span>}
            {u.pure && u.type !== "etf" && <span className="wt-b pure">Pure-play</span>}
            {u.choke && <span className="wt-b choke">Chokepoint</span>}
          </div>
        </div>
        <div className="wt-thesis">{u.thesis}</div>
        <div className="wt-fetchrow">
          <button className="wt-mini" onClick={function () { fetchOne(u.t); }} disabled={st.loading}>
            <RefreshCw size={12} className={st.loading ? "spin" : ""} />
            {st.loading ? "Fetching" : d ? "Refresh" : "Fetch live"}
          </button>
          {d && d.asOf && <span className="wt-as">as of {d.asOf}</span>}
        </div>
        {st.error && <div className="wt-err">{st.error}</div>}
        {d && (
          <div className="wt-live">
            <div className="wt-price">
              <span className="wt-px">{money(d.price)}</span>
              {d.changePct != null && <span className={"wt-chg " + (d.changePct >= 0 ? "up" : "down")}>{pct(d.changePct)}</span>}
            </div>
            <div className="wt-metric">
              <div><div className="k">Fwd P/E</div><div className="v">{d.peFwd != null ? Number(d.peFwd).toFixed(1) : "—"}</div></div>
              <div><div className="k">52-wk low</div><div className="v">{money(d.low52)}</div></div>
              <div><div className="k">52-wk high</div><div className="v">{money(d.high52)}</div></div>
            </div>
            {pos != null && (
              <div className="rp">
                <div className="rp-lbl"><span>near low</span><span>near high</span></div>
                <div className="rp-track"><div className="rp-mark" style={{ left: (pos * 100) + "%" }} /></div>
                <div className="rp-cap">range position {Math.round(pos * 100)}% · low-in-range can be value or a warning — never buy on range alone</div>
              </div>
            )}
            {d.note && <div className="wt-note">{d.note}</div>}
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="wt">
      <div className="wt-wrap">
        <div className="wt-ribbon">
          “Know well the condition of your flocks, and give attention to your herds.”
          <span>Proverbs 27:23</span>
        </div>

        <div className="wt-eyebrow">The Watchtower</div>
        <h1 className="wt-h1">Know the condition of your holdings.</h1>
        <p className="wt-lede">
          The plan sets the pace; this is where you watch. Live snapshots, a thesis screener for any ticker you're
          curious about, and a planner that stages your entries so you average in instead of betting on one day's price.
        </p>
        <div className="wt-flag">
          <b>Read this once.</b> Prices are pulled on demand via web search — snapshots, not a live feed. Treat every
          number as something to verify before you act. This is analytical context, not advice and not a buy/sell signal.
        </div>

        {/* TRACKER */}
        <div className="wt-sect">
          <div className="wt-sh"><Layers size={20} /> Live tracker</div>
          <div className="wt-ss">The seven layers, name by name. Tap a card to pull its current price, multiple, and where it sits in its 52-week range.</div>
          <button className="wt-btn" onClick={fetchAll} disabled={allLoading}>
            <RefreshCw size={14} className={allLoading ? "spin" : ""} /> {allLoading ? "Fetching all…" : "Fetch all live"}
          </button>
          {LAYER_ORDER.map(function (layer) {
            return (
              <div key={layer}>
                <div className="wt-laytag">{layer}</div>
                <div className="wt-cards">
                  {UNIVERSE.filter(function (u) { return u.layer === layer; }).map(renderCard)}
                </div>
              </div>
            );
          })}
        </div>

        {/* SCREENER */}
        <div className="wt-sect">
          <div className="wt-sh"><Search size={20} /> Thesis screener</div>
          <div className="wt-ss">Type any ticker. It gets scored against the build-out thesis — which layer it fits, whether it owns a chokepoint, pure-play or diversified.</div>
          <div className="wt-inrow">
            <input className="wt-in" placeholder="e.g. PWR, SMCI, NBIS" value={scrTicker}
              onChange={function (e) { setScrTicker(e.target.value); }}
              onKeyDown={function (e) { if (e.key === "Enter") runScreen(); }} />
            <button className="wt-btn" onClick={runScreen} disabled={scrLoading}>
              {scrLoading ? <RefreshCw size={14} className="spin" /> : <Search size={14} />} {scrLoading ? "Testing" : "Test it"}
            </button>
          </div>
          {scrErr && <div className="wt-err">{scrErr}</div>}
          {scrResult && (
            <div className={"wt-result " + (scrResult.qualifies === "Strong fit" ? "strong" : scrResult.qualifies === "Partial fit" ? "partial" : "off")}>
              <div className="wt-crow">
                <div>
                  <div className="wt-tick">{scrResult.ticker}</div>
                  <div className="wt-name">{scrResult.name}</div>
                </div>
                <div className={"wt-verdict " + (scrResult.qualifies === "Strong fit" ? "strong" : scrResult.qualifies === "Partial fit" ? "partial" : "off")}>
                  {scrResult.qualifies}
                </div>
              </div>
              <div className="wt-rmeta">
                {scrResult.layer && scrResult.layer !== "None" && <span className="wt-b pure">{scrResult.layer}</span>}
                {scrResult.chokepoint && <span className="wt-b choke">Chokepoint</span>}
                {scrResult.pureplay && <span className="wt-b etf">{scrResult.pureplay}</span>}
                {scrResult.peFwd != null && <span className="wt-b" style={{ background: "var(--raise)", color: "var(--parchment)" }}>Fwd P/E {Number(scrResult.peFwd).toFixed(1)}</span>}
              </div>
              <div className="wt-rthesis">{scrResult.thesis}</div>
              {scrResult.qualifies !== "Off-thesis" && (
                <button className="wt-mini" style={{ marginTop: 12 }} onClick={function () { addWatch(scrResult); }}>
                  <Plus size={12} /> Add to watchlist
                </button>
              )}
            </div>
          )}
          {watch.length > 0 && (
            <div className="wt-watch">
              <div className="wt-laytag">Watchlist</div>
              {watch.map(function (w) {
                return (
                  <div className="wt-witem" key={w.ticker}>
                    <span className="t">{w.ticker}</span>
                    <span className="l">{w.layer} · {w.qualifies}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* PLANNER */}
        <div className="wt-sect">
          <div className="wt-sh"><Target size={20} /> Staged-entry planner</div>
          <div className="wt-ss">Average in, don't lump in. <em>“Count the cost before you build.” — Luke 14:28.</em> Split a target position into tranches so no single day's price decides the whole thing.</div>
          <div className="wt-plan">
            <div className="wt-pgrid">
              <div>
                <div className="wt-plbl">Security</div>
                <select className="wt-sel" value={planTicker} onChange={function (e) { setPlanTicker(e.target.value); }}>
                  {planOptions.map(function (t) { return <option key={t} value={t}>{t}</option>; })}
                </select>
              </div>
              <div>
                <div className="wt-plbl">Target position</div>
                <input className="wt-in" style={{ textTransform: "none" }} type="number" value={planTarget}
                  onChange={function (e) { setPlanTarget(Math.max(0, Number(e.target.value) || 0)); }} />
              </div>
              <div>
                <div className="wt-plbl">Tranches</div>
                <div className="wt-seg">
                  {[2, 3, 4, 5].map(function (n) {
                    return <button key={n} className={planTranches === n ? "on" : ""} onClick={function () { setPlanTranches(n); }}>{n}</button>;
                  })}
                </div>
              </div>
            </div>
            <div className="wt-toggle" onClick={function () { setPlanDip(!planDip); }}>
              <span className={"dot" + (planDip ? " on" : "")}><i /></span>
              Space adds on dips (−8% steps){planDip ? "" : " — off: space by month instead"}
            </div>
            {!planLive && (
              <div className="wt-ss" style={{ marginBottom: 12 }}>
                Tip: tap <b>Fetch live</b> on {planTicker} in the tracker to fill in share estimates and dip-trigger prices.
              </div>
            )}
            <div className="wt-tranche">
              {tranches.map(function (tr, idx) {
                return (
                  <div className="wt-trow" key={idx}>
                    <div>
                      <div className="a">{tr.label}</div>
                      <div className="c">
                        {tr.trigPrice ? "≈ " + money(tr.trigPrice) + " trigger · " : ""}
                        {tr.shares ? "~" + tr.shares.toFixed(tr.shares < 10 ? 2 : 1) + " shares" : "share est. after live fetch"}
                      </div>
                    </div>
                    <div className="b">{money(tr.amount)}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        <div className="wt-foot">
          On-demand snapshots via web search may be delayed or imperfect — confirm against your brokerage before any trade.
          Nothing here is investment advice, a recommendation, or a signal; range position and multiples are context for
          your own judgment. Staging entries reduces timing risk — it does not remove the risk that a thesis is simply wrong.
          <div className="v">Whatever you do, work heartily. — Colossians 3:23</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
