function MiniChart(props){
  var data = props.data || [];
  if (data.length < 2) return null;
  var W=520,H=168,pl=48,pr=10,pt=10,pb=22;
  var maxY = Math.max.apply(null, data.map(function(d){return d.total;})) * 1.08 || 1;
  var n = data.length;
  var idx = data.map(function(_,i){return i;});
  function x(i){ return pl + (i/(n-1))*(W-pl-pr); }
  function y(v){ return pt + (1 - v/maxY)*(H-pt-pb); }
  var base = H-pb;
  var contribTop = idx.map(function(i){ return x(i)+' '+y(data[i].contributed); }).join(' L');
  var contribPath = 'M'+x(0)+' '+base+' L'+contribTop+' L'+x(n-1)+' '+base+' Z';
  var topStr = idx.map(function(i){ return x(i)+' '+y(data[i].total); }).join(' L');
  var botStr = idx.slice().reverse().map(function(i){ return x(i)+' '+y(data[i].contributed); }).join(' L');
  var growthPath = 'M'+topStr+' L'+botStr+' Z';
  return (
    <svg viewBox={'0 0 '+W+' '+H} width="100%" height="168" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="gC" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#4F9C86" stopOpacity="0.5"/><stop offset="100%" stopColor="#4F9C86" stopOpacity="0.12"/></linearGradient>

          <line x1={pl} y1={y(v)} x2={W-pr} y2={y(v)} stroke="rgba(198,162,76,0.1)"/>
          <text x={pl-6} y={y(v)+3} textAnchor="end" fontSize="10" fill="#8FA39A" fontFamily="monospace">{fmtK(v)}</text>
        </g>); })}
      <path d={contribPath} fill="url(#gC)" stroke="#4F9C86" strokeWidth="1.5"/>
      <path d={growthPath} fill="url(#gG)" stroke="#E7C878" strokeWidth="1.5"/>
      {idx.map(function(i){ if(i===0||i===n-1||i===Math.floor((n-1)/2)){ return (

    </svg>
  );
}

function fmt(n) {
  return "$" + Math.round(n).toLocaleString("en-US");
}
function fmtK(n) {
  if (n >= 1000000) return "$" + (n / 1000000).toFixed(n >= 10000000 ? 0 : 1) + "M";
  if (n >= 1000) return "$" + Math.round(n / 1000) + "k";
  return "$" + Math.round(n);
}

function project(start, monthly, years, ratePct) {
  var rm = ratePct / 100 / 12;
  var bal = start;
  var contrib = start;
  var data = [{ year: 0, contributed: start, growth: 0, total: start }];
  for (var m = 1; m <= years * 12; m++) {
    bal = bal * (1 + rm) + monthly;
    contrib += monthly;
    if (m % 12 === 0) {
      data.push({
        year: m / 12,
        contributed: Math.round(contrib),
        growth: Math.round(Math.max(0, bal - contrib)),
        total: Math.round(bal),
      });
    }
  }
  return data;
}

  );
}

              <div className="tdi-anchor"><span>$50</span><span>$3,000</span></div>
            </div>

            <div className="tdi-ctl">
              <div className="tdi-lbl"><span>Time horizon</span><b>{years} years</b></div>
              <div className="tdi-seg">
                {[5, 10, 15, 20, 25].map(function (y) {
                  return (
                    <button key={y} className={years === y ? "on" : ""} onClick={function () { setYears(y); }}>{y}</button>
                  );
                })}
              </div>
            </div>

            <div className="tdi-ctl">
              <div className="tdi-lbl"><span>Assumed annual return</span><b>{rate}%</b></div>
              <input className="tdi-rng" type="range" min={3} max={15} step={0.5} value={rate}
                onChange={function (e) { setRate(Number(e.target.value)); }} />
              <div className="tdi-anchor"><span>3% · cautious</span><span>~7–10% · broad market</span><span>15%</span></div>
            </div>

            <div className="tdi-ctl">
              <div className="tdi-lbl"><span>AI satellite weight</span><b>{sat}%</b></div>
              <input className="tdi-rng" type="range" min={0} max={40} step={5} value={sat}
                onChange={function (e) { setSat(Number(e.target.value)); }} />
              <div className="tdi-anchor"><span>0% · all core</span><span>{100 - sat}% core / {sat}% AI</span><span>40%</span></div>
            </div>
          </div>

          <div className="tdi-panel tdi-result">
            <div className="tdi-bigcap">Projected in {years} years</div>
            <div className="tdi-big">{fmt(end.total)}</div>
            <div className="tdi-split">
              <div><div className="k">You put in</div><div className="v tdi-vg">{fmt(contributed)}</div></div>
              <div><div className="k">Compounding added</div><div className="v tdi-br">{fmt(growth)}</div></div>
            </div>

            <div style={{ height: 168, marginTop: 18, marginLeft: -8 }}>
              <MiniChart data={data} />
            </div>

            <div style={{ display: "flex", gap: 16, marginTop: 14, flexWrap: "wrap" }}>
              {scenarios.map(function (s) {
                return (
                  <div key={s.r} style={{ flex: 1, minWidth: 90 }}>
                    <div style={{ fontSize: 10.5, color: "var(--muted)", textTransform: "uppercase", letterSpacing: 1.2 }}>
                      {s.r === 6 ? "Cautious 6%" : s.r === 9 ? "Base 9%" : "Ambitious 12%"}
                    </div>
                    <div style={{ fontFamily: "Saira Condensed", fontWeight: 600, fontSize: 18, color: s.r === 12 ? "var(--brass-bright)" : "var(--parchment)" }}>
                      {fmtK(s.total)}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* THE STACK */}
        <div className="tdi-sect">
          <div className="tdi-sect-h">What AI needs to thrive</div>
          <div className="tdi-sect-s">
            Seven layers of the physical build-out. In a supply-constrained boom, the money accrues to whoever owns the
            chokepoint. <b style={{ color: "var(--brass)" }}>Gold chips are ETFs</b> — one-click, diversified exposure to a layer.
            The rest are representative companies to research, not a buy list.
          </div>

          <div className="tdi-core">
            <div className="lead">The core comes first — VOO / VTI</div>
            <div style={{ fontSize: 12.8, color: "var(--muted)", marginTop: 4 }}>
              A broad-market index fund is the foundation the whole plan stands on. The AI layers below are the satellite you
              build on top of it — not a replacement for it.
            </div>
          </div>

          <div className="tdi-layers">
            {LAYERS.map(function (L) {
              return (
                <div className="tdi-layer" key={L.nm}>
                  <div className="tag">{L.tag}</div>
                  <div className="nm">{L.nm}</div>
                  <div className="bn">{L.bn[0]}<b>{L.bn[1]}</b></div>
                  <div className="tdi-tick">
                    {L.etf.map(function (t) { return <span key={t} className="tdi-chip etf">{t}</span>; })}
                    {L.names.map(function (t) { return <span key={t} className="tdi-chip">{t}</span>; })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* PRINCIPLES */}
        <div className="tdi-sect">
          <div className="tdi-sect-h">The discipline that turns it into wealth</div>
          <div className="tdi-sect-s">The research picks the horse. These four keep you in the saddle long enough to be paid.</div>
          <div className="tdi-princ">
            {PRINCIPLES.map(function (p) {
              return (
                <div className="tdi-p" key={p.n}>
                  <div className="n">{p.n}</div>
                  <div className="t">{p.t}</div>
                  <div className="d">{p.d}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* RISK */}
        <div className="tdi-risk">
          <h4>Eyes open — the honest risks</h4>
          <ul>
            <li><b>The math is stretched.</b> J.P. Morgan estimates the AI industry needs ~$650B of new annual revenue just to earn 10% on what's being built — against $50–150B today. A gap the market is paying for in advance.</li>
            <li><b>Chips age like phones, not buildings.</b> GPUs sit on 5–6yr depreciation schedules with a 2–3yr real economic life. If the market re-prices that, infrastructure names can fall 40–60%.</li>
            <li><b>Circular financing.</b> In June 2026 the BIS flagged an AI-capex bust and circular financing among its top threats to financial stability. The fragility concentrates in debt-funded "neoclouds," less so the cash-funded hyperscalers.</li>
            <li><b>Concentration.</b> AI capex drove ~74% of US GDP growth in early 2026 — so a pullback is a macro event, which is exactly why a diversified core matters.</li>
          </ul>
        </div>

        <div className="tdi-foot">
          This is an educational model, not investment advice, a forecast, or a recommendation of any security. Assumed returns are
          illustrative inputs you choose — real markets don't deliver a smooth number, and thematic sleeves can lose value, including
          permanently. You already bring CFA-level judgment to this; for a full plan tuned to your taxes and goals, a fee-only
          fiduciary is worth an hour of your time.
          <div className="v">Whatever you do, work at it with all your heart. — Colossians 3:23</div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
